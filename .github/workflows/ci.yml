name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      VAULT_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      CELERY_EAGER: "true"
      CHANNEL_LAYER_INMEMORY: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend
        run: pip install -r backend/requirements.txt

      - name: Dependency audit
        run: pip install pip-audit && pip-audit -r backend/requirements.txt

      - name: Django checks
        working-directory: backend
        run: python manage.py check

      - name: Backend tests
        working-directory: backend
        env:
          VAULT_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        run: |
          pip install coverage
          coverage run manage.py test apps.accounts apps.api_transfer apps.runs apps.diagnostics apps.core apps.deploy apps.vault apps.projects apps.stripe_core apps.billing apps.organizations
          coverage report --fail-under=30

      - name: Migrate (smoke test DB)
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Smoke test
        working-directory: backend
        run: python manage.py smoke_test

      - name: Frontend build
        run: npm ci --prefix frontend && npm run build --prefix frontend
