[phases.setup]
nixPkgs = ["python312", "nodejs_20", "git"]

[phases.install]
cmds = [
  "npm --prefix frontend ci --include=dev",
  "pip install -r backend/requirements.txt"
]

[phases.build]
cmds = [
  "npm --prefix frontend run build"
]

# Prefer Dockerfile deploy (railway.toml). If using Nixpacks, entrypoint steps run inline here.
[start]
cmd = "cd backend && python manage.py collectstatic --noinput && python manage.py migrate --noinput && daphne -b 0.0.0.0 -p $PORT config.asgi:application"
